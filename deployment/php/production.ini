[PHP]
; 💡 核心基础设置
variables_order = "EGPCS"
expose_php = Off
max_execution_time = 60
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
display_errors = Off
log_errors = On

; 🚀 内存优化（24G 内存非常充裕，单个 Worker 限制放宽到 1G，防止处理大文件或复杂报表时溢出）
memory_limit = 1G

[Opcache]
opcache.enable = 1
opcache.enable_cli = 1

; 🚀 缓存池优化（既然内存管够，直接拉大，把整个 Laravel 13 的源码和依赖全部死死锁在内存里）
opcache.memory_consumption = 512MB
opcache.interned_strings_buffer = 64MB
opcache.max_accelerated_files = 30000

; 🚀 性能榨干设置（彻底关闭磁盘文件检查，常驻内存模式下不需要它）
opcache.validate_timestamps = 0
opcache.preload_user = www-data

; ⚡ ARM64 绝配：开启 PHP 8.4 高性能 JIT (即时编译)
; 现代 ARM64 架构（如 Ampere Altra）拥有极强的并行计算和流水线能力，JIT 能带来巨大的 CPU 性能红利
opcache.jit = tracing
opcache.jit_buffer_size = 128MB
