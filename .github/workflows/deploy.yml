name: 🚀 生产环境自动化部署 (远程构建版)

on:
  push:
    branches:
      - main

# 赋予 GitHub Actions 推送镜像到 GitHub 容器注册表的权限
permissions:
  contents: read
  packages: write

jobs:
  # ==========================================
  # 任务 1: 在 GitHub 服务器上构建 Docker 镜像并推送
  # ==========================================
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v7

      - name: 登录到 GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 开启 QEMU 模拟器，支持跨架构编译
      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 构建并推送到 GHCR (指定 ARM64 架构)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          # 强制编译为 ARM64 架构，完美契合你的服务器！
          platforms: linux/arm64
          # 将这里的标签替换为你的实际仓库路径 (必须全部小写)
          tags: ghcr.io/teslalyon/laravel13-react:latest
          # 🚀 核心优化：开启 GitHub Actions 原生 Docker 层缓存
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================
  # 任务 2: 登录你的服务器，只负责拉取镜像和重启
  # ==========================================
  deploy:
    # 必须等任务 1 (构建) 成功后，才执行任务 2 (部署)
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: 登录服务器并更新
        uses: appleboy/ssh-action@v1.2.5
        # 👇 核心秘籍 1：将 GitHub 提供的临时 Token 存入环境变量
        env:
          TEMP_GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          # 👇 核心秘籍 2：允许 SSH 脚本读取这个临时变量
          envs: TEMP_GH_TOKEN
          script: |
            set -e
            cd ${{ secrets.PROJECT_PATH }} || exit

            # 👇 核心秘籍 3：使用临时 Token 自动登录 Docker！
            echo "🔐 正在使用一次性令牌登录 Docker 镜像库..."
            echo "$TEMP_GH_TOKEN" | docker login ghcr.io -u teslalyon --password-stdin

            echo "📥 正在拉取最新的 ARM64 镜像..."
            docker compose -f docker-compose.yml pull app

            echo "📦 正在精准重启应用容器..."
            docker compose -f docker-compose.yml up -d --no-deps app

            # 👇 核心秘籍 4：过河拆桥，拉完镜像立刻退出登录，保证服务器绝对安全！
            docker logout ghcr.io
            docker image prune -f

            echo "✅ 极致安全的自动化部署完成！"
