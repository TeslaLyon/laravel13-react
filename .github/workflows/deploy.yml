name: 🚀 生产环境自动化部署 (远程构建版)

on:
  push:
    branches:
      - main

# 赋予 GitHub Actions 推送镜像到 GitHub 容器注册表的权限
permissions:
  contents: read
  packages: write

jobs:
  # ==========================================
  # 任务 1: 在 GitHub 服务器上构建 Docker 镜像并推送
  # ==========================================
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v7

      - name: 登录到 GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 开启 QEMU 模拟器，支持跨架构编译
      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 构建并推送到 GHCR (指定 ARM64 架构)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          # 强制编译为 ARM64 架构，完美契合你的服务器！
          platforms: linux/arm64
          # 将这里的标签替换为你的实际仓库路径 (必须全部小写)
          tags: ghcr.io/teslalyon/laravel13-react:latest
          # 🚀 核心优化：开启 GitHub Actions 原生 Docker 层缓存
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================
  # 任务 2: 登录你的服务器，只负责拉取镜像和重启
  # ==========================================
  deploy:
    # 必须等任务 1 (构建) 成功后，才执行任务 2 (部署)
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: 登录服务器并更新
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            echo "🚀 开始更新服务器..."
            cd ${{ secrets.PROJECT_PATH }} || exit

            git fetch --all
            git reset --hard origin/main
            git pull origin main

            echo "📥 正在拉取最新的 ARM64 镜像..."
            docker compose -f docker-compose.yml pull app

            # 启动容器 (容器会自动执行配置优化，不需要我们操心了)
            echo "📦 正在精准重启应用容器..."
            docker compose up -d --no-deps app

            # 清理废弃镜像
            docker image prune -f

            echo "✅ 极致丝滑的部署完成！"
