name: 🚀 生产环境自动化部署

# 触发条件：当代码推送到 main 分支时执行
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 登录服务器并部署更新
        # 使用 appleboy 的开源 SSH 插件
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          # 登录后要在服务器上执行的命令
          script: |
            echo "🚀 开始部署项目..."

            # 进入项目目录 (如果在服务器端不存在则报错)
            cd ${{ secrets.PROJECT_PATH }} || exit

            # 放弃服务器上任何可能的本地修改，拉取最新代码
            git fetch --all
            git reset --hard origin/main
            git pull origin main

            # 重建并重启 Docker 容器 (后台运行，不中断现有服务的情况下的滚动更新)
            echo "📦 正在构建并启动 Docker 容器..."
            docker compose -f docker-compose.yml up -d --build

            # 优化 Laravel 缓存 (利用 Octane 的常驻特性，建议清理一下)
            echo "🧹 正在优化 Laravel 配置..."
            docker exec laravel_app php artisan optimize:clear
            docker exec laravel_app php artisan optimize

            # 重启 Octane 进程让新代码生效
            echo "🔄 重启 Octane 服务..."
            docker exec laravel_app php artisan octane:reload

            echo "✅ 部署完成！"
